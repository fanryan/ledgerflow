spring:
  application:
    name: ledger-api

  datasource:
    url: jdbc:postgresql://localhost:5432/ledgerflow
    username: ledgerflow
    password: ledgerflow

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: ledgerflow-ledger-api
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8080

logging:
  level:
    root: INFO

ledgerflow:
  jwt:
    secret: ${LEDGERFLOW_JWT_SECRET:local-development-secret-key-change-later-please-make-this-long}
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 7

  outbox:
    publisher:
      enabled: ${LEDGERFLOW_OUTBOX_PUBLISHER_ENABLED:true}
      fixed-delay-ms: 5000

  paycore:
    kafka:
      consumer-group-id: paycore-consumer