spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ledgerflow
    username: ledgerflow
    password: ledgerflow

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

ledgerflow:
  jwt:
    secret: ${LEDGERFLOW_JWT_SECRET:local-development-secret-key-change-later-please-make-this-long}
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 7

  outbox:
    publisher:
      enabled: false
