spring:
  application:
    name: ledger-api

  datasource:
    url: jdbc:postgresql://localhost:5432/ledgerflow
    username: ledgerflow
    password: ledgerflow

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    root: INFO

ledgerflow:
  jwt:
    secret: "local-development-secret-key-change-later-please-make-this-long"
    access-token-ttl-minutes: 60
    refresh-token-ttl-days: 7